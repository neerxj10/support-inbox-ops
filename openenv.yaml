name: support-inbox-ops
version: 0.1.0
description: Real-world customer support triage environment for OpenEnv agents.
entrypoint: app.server:app
environment:
  module: app.env
  class: SupportInboxEnv
metadata:
  domain: customer-support
  tags:
    - openenv
    - support
    - triage
    - evaluation
  difficulty_levels:
    - easy
    - medium
    - hard
  endpoints:
    - /reset
    - /step
    - /state
    - /tasks
    - /grader
    - /baseline

